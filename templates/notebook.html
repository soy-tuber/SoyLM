<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ notebook.name }} — SoyLM</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #1e2a47;
            --bg-hover: #253559;
            --bg-input: #131a2e;
            --text-primary: #e8e8e8;
            --text-secondary: #8b95a5;
            --text-dim: #5a6577;
            --accent: #4fc3f7;
            --accent-hover: #29b6f6;
            --accent-dim: rgba(79,195,247,0.15);
            --border: #2a3a5c;
            --danger: #ef5350;
            --success: #66bb6a;
            --warning: #ffa726;
            --radius: 8px;
            --radius-lg: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ── Header ── */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header .back { color: var(--text-secondary); text-decoration: none; font-size: 18px; }
        .header .back:hover { color: var(--accent); }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .badge {
            font-size: 11px; padding: 3px 8px; border-radius: 20px;
            background: var(--accent-dim); color: var(--accent);
        }

        /* ── 3-Column Layout ── */
        .columns {
            display: grid; grid-template-columns: 280px 1fr 280px;
            flex: 1; overflow: hidden;
        }

        /* ── Left: Sources ── */
        .col-sources {
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .col-title {
            padding: 14px 16px; font-size: 13px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-secondary); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .source-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .source-item {
            padding: 10px 12px; border-radius: var(--radius);
            margin-bottom: 4px; font-size: 13px; cursor: default;
            display: flex; align-items: center; justify-content: space-between;
            transition: background 0.1s;
        }
        .source-item:hover { background: var(--bg-hover); }
        .source-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .source-item .status {
            width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0;
        }
        .status-loaded { background: var(--success); }
        .status-pending { background: var(--warning); }
        .source-item .del-btn {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.1s;
        }
        .source-item:hover .del-btn { opacity: 1; }
        .source-item .del-btn:hover { color: var(--danger); }
        .source-actions {
            padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0;
        }

        /* ── Center: Chat ── */
        .col-chat {
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-toolbar {
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chat-toolbar select, .chat-toolbar label {
            font-size: 12px; color: var(--text-secondary);
        }
        .chat-toolbar select {
            background: var(--bg-secondary); border: 1px solid var(--border);
            color: var(--text-primary); padding: 5px 8px; border-radius: var(--radius);
            outline: none;
        }
        .chat-toolbar .toggle {
            display: flex; align-items: center; gap: 4px; font-size: 12px;
            color: var(--text-secondary); cursor: pointer; user-select: none;
        }
        .chat-toolbar .toggle input { accent-color: var(--accent); }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px; display: flex;
            flex-direction: column; gap: 16px;
        }
        .msg {
            max-width: 85%; padding: 12px 16px; border-radius: var(--radius-lg);
            font-size: 14px; line-height: 1.65; white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-user {
            align-self: flex-end; background: var(--accent-dim); color: var(--text-primary);
            border-bottom-right-radius: 4px;
        }
        .msg-assistant {
            align-self: flex-start; background: var(--bg-card);
            border-bottom-left-radius: 4px;
        }
        .msg-system {
            align-self: center; background: transparent; color: var(--text-dim);
            font-size: 12px; font-style: italic;
        }
        .tool-status {
            margin-bottom: 8px; padding: 6px 10px; font-size: 12px;
            color: var(--accent); background: var(--accent-dim);
            border-radius: var(--radius); white-space: pre-wrap;
        }
        .thinking {
            margin-bottom: 8px; font-size: 12px; color: var(--text-dim);
        }
        .thinking summary { cursor: pointer; }
        .thinking pre {
            margin: 4px 0 0; white-space: pre-wrap; font-size: 11px;
            max-height: 200px; overflow-y: auto; color: var(--text-dim);
        }
        .search-results {
            margin-top: 8px; padding: 8px 12px; background: var(--bg-secondary);
            border-radius: var(--radius); font-size: 12px;
        }
        .search-results a { color: var(--accent); text-decoration: none; }
        .search-results a:hover { text-decoration: underline; }
        .chat-input-bar {
            padding: 12px 16px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .chat-input-bar textarea {
            flex: 1; padding: 10px 14px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            color: var(--text-primary); font-size: 14px; resize: none;
            outline: none; min-height: 44px; max-height: 120px;
            font-family: inherit;
        }
        .chat-input-bar textarea:focus { border-color: var(--accent); }
        .chat-input-bar .send-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: var(--accent); color: #0a0a1a; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.15s;
        }
        .chat-input-bar .send-btn:hover { background: var(--accent-hover); }
        .chat-input-bar .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Right: Chat Logs ── */
        .col-logs {
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .log-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .log-item {
            padding: 10px 12px; border-radius: var(--radius); margin-bottom: 4px;
            font-size: 13px; cursor: pointer; display: flex; align-items: center;
            justify-content: space-between; transition: background 0.1s;
        }
        .log-item:hover { background: var(--bg-hover); }
        .log-item.active { background: var(--accent-dim); border: 1px solid var(--accent); }
        .log-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-item .actions { display: flex; gap: 4px; }
        .log-item .actions button {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 13px; padding: 2px;
        }
        .log-item .actions button:hover { color: var(--accent); }
        .log-actions {
            padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0;
        }

        /* ── Shared ── */
        .btn {
            padding: 8px 14px; border-radius: var(--radius); border: none;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
            width: 100%;
        }
        .btn-primary { background: var(--accent); color: #0a0a1a; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-load {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: #0a0a1a; font-weight: 700;
        }
        .btn + .btn { margin-top: 6px; }
        .loading { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 24px; width: 480px; max-width: 90vw;
        }
        .modal h3 { margin-bottom: 16px; font-size: 16px; }
        .modal input[type="file"], .modal textarea, .modal input[type="text"] {
            width: 100%; padding: 10px; margin-bottom: 12px;
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text-primary);
            font-size: 13px; font-family: inherit;
        }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
        .modal .btn-row .btn { width: auto; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
        .msg-assistant { line-height: 1.6; }
        .msg-assistant h1, .msg-assistant h2, .msg-assistant h3 { margin: 8px 0 4px; }
        .msg-assistant p { margin: 4px 0; }
        .msg-assistant ul, .msg-assistant ol { margin: 4px 0; padding-left: 20px; }
        .msg-assistant code { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-size: 13px; }
        .msg-assistant pre { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; overflow-x: auto; }
        .msg-assistant pre code { background: none; padding: 0; }
        .msg-assistant blockquote { border-left: 3px solid var(--accent); padding-left: 10px; margin: 4px 0; color: var(--text-dim); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="/" class="back">&larr;</a>
            <h1>{{ notebook.name }}</h1>
            <span class="badge" id="source-count">{{ sources|length }} sources</span>
        </div>
    </div>

    <!-- 3 Columns -->
    <div class="columns">
        <!-- LEFT: Sources -->
        <div class="col-sources">
            <div class="col-title">
                Sources
                <button class="btn btn-outline" style="width:auto;padding:4px 10px;" onclick="openUploadModal()">+ Add</button>
            </div>
            <div class="source-list" id="source-list">
                {% for s in sources %}
                <div class="source-item" id="src-{{ s.id }}" onclick="previewSource('{{ s.id }}')" style="cursor:pointer;">
                    <span class="status {{ 'status-loaded' if s.loaded else 'status-pending' }}"></span>
                    <span class="name" title="{{ s.filename }}">{{ s.filename }}</span>
                    <button class="del-btn" onclick="event.stopPropagation();deleteSource('{{ s.id }}')" title="Delete">✕</button>
                </div>
                {% endfor %}
            </div>
            <div class="source-actions">
                <button class="btn btn-load" id="load-btn" onclick="loadSources()">
                    Load Sources
                </button>
            </div>
        </div>

        <!-- CENTER: Chat -->
        <div class="col-chat">
            <div class="chat-toolbar">
                <label class="toggle">
                    <input type="checkbox" id="enable-search"> Web Search
                </label>
                <label class="toggle" style="margin-left:8px;">
                    Temp: <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"
                        style="width:80px;vertical-align:middle;" oninput="document.getElementById('temp-val').textContent=this.value">
                    <span id="temp-val" style="font-size:11px;min-width:24px;display:inline-block;">0.7</span>
                </label>
                <button class="btn btn-outline" style="width:auto;padding:4px 10px;margin-left:auto;" onclick="openSettingsModal()">Settings</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg msg-system">Add sources and click "Load Sources" to get started</div>
            </div>
            <div class="chat-input-bar">
                <textarea id="chat-input" placeholder="Ask a question..." rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">&#9654;</button>
            </div>
        </div>

        <!-- RIGHT: Chat Logs -->
        <div class="col-logs">
            <div class="col-title">
                Chat History
                <button class="btn btn-outline" style="width:auto;padding:4px 10px;" onclick="newChatlog()">+ New</button>
            </div>
            <div class="log-list" id="log-list">
                {% for cl in chatlogs %}
                <div class="log-item" id="log-{{ cl.id }}" onclick="loadChatlog('{{ cl.id }}')">
                    <span class="title">{{ cl.title }}</span>
                    <div class="actions">
                        <button onclick="event.stopPropagation();downloadChatlog('{{ cl.id }}')" title="Download">&#11015;</button>
                        <button onclick="event.stopPropagation();deleteChatlog('{{ cl.id }}')" title="Delete">✕</button>
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="log-actions">
                <button class="btn btn-outline" onclick="newChatlog()">+ New Chat</button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="upload-modal">
        <div class="modal">
            <h3>Add Sources</h3>
            <form id="upload-form" onsubmit="uploadSources(event)">
                <input type="file" id="upload-files" multiple accept=".txt,.md,.py,.rs,.ts,.js,.json,.csv,.html,.xml,.yaml,.yml,.toml,.pdf">
                <textarea id="upload-urls" placeholder="Enter URLs (one per line, YouTube supported)" rows="3"></textarea>
                <textarea id="upload-paste" placeholder="Paste text directly..."></textarea>
                <div class="btn-row">
                    <button type="button" class="btn btn-outline" onclick="closeUploadModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>Chat Settings</h3>
            <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px;">System Prompt</label>
            <textarea id="system-prompt" rows="6" placeholder="You are an expert research assistant..."></textarea>
            <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px;">Temperature: <span id="settings-temp-val">0.7</span></label>
            <input type="range" id="settings-temperature" min="0" max="2" step="0.1" value="0.7"
                style="width:100%;margin-bottom:12px;"
                oninput="document.getElementById('settings-temp-val').textContent=this.value">
            <div class="btn-row">
                <button class="btn btn-outline" onclick="closeSettingsModal()">Cancel</button>
                <button class="btn btn-primary" onclick="applySettings()">Apply</button>
            </div>
        </div>
    </div>

    <!-- Source Preview Modal -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal" style="width:640px;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h3 id="preview-title" style="margin:0;">Source Preview</h3>
                <button class="btn btn-outline" style="width:auto;padding:4px 10px;" onclick="closePreviewModal()">Close</button>
            </div>
            <div id="preview-meta" style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;"></div>
            <div id="preview-content" style="flex:1;overflow-y:auto;white-space:pre-wrap;font-size:13px;
                background:var(--bg-input);padding:12px;border-radius:var(--radius);max-height:60vh;word-break:break-word;"></div>
        </div>
    </div>

    <script>
    const NB_ID = '{{ notebook.id }}';
    let currentChatlogId = null;
    let isStreaming = false;

    // ── Upload Modal ──
    // ── Modals ──
    function openUploadModal() { document.getElementById('upload-modal').classList.add('show'); }
    function closeUploadModal() { document.getElementById('upload-modal').classList.remove('show'); }
    function openSettingsModal() {
        document.getElementById('settings-temperature').value = document.getElementById('temperature').value;
        document.getElementById('settings-temp-val').textContent = document.getElementById('temperature').value;
        document.getElementById('settings-modal').classList.add('show');
    }
    function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('show'); }
    function applySettings() {
        const temp = document.getElementById('settings-temperature').value;
        document.getElementById('temperature').value = temp;
        document.getElementById('temp-val').textContent = temp;
        closeSettingsModal();
    }
    function openPreviewModal() { document.getElementById('preview-modal').classList.add('show'); }
    function closePreviewModal() { document.getElementById('preview-modal').classList.remove('show'); }

    async function previewSource(id) {
        openPreviewModal();
        document.getElementById('preview-title').textContent = 'Loading...';
        document.getElementById('preview-meta').textContent = '';
        document.getElementById('preview-content').textContent = '';
        try {
            const r = await fetch('/api/sources/' + id);
            const data = await r.json();
            document.getElementById('preview-title').textContent = data.filename || 'Source';
            const meta = [`Type: ${data.source_type}`, `Tokens: ~${data.token_estimate}`, `Loaded: ${data.loaded ? 'Yes' : 'No'}`];
            if (data.summary) meta.push(`Summary: ${data.summary}`);
            document.getElementById('preview-meta').textContent = meta.join(' | ');
            const text = data.raw_text || '(no content)';
            document.getElementById('preview-content').textContent = text.slice(0, 50000);
        } catch (e) {
            document.getElementById('preview-title').textContent = 'Error';
            document.getElementById('preview-content').textContent = e.message;
        }
    }

    async function uploadSources(e) {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.textContent = 'Adding...';
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        try {
            const form = new FormData();
            form.append('notebook_id', NB_ID);
            const files = document.getElementById('upload-files').files;
            for (const f of files) form.append('files', f);
            form.append('urls', document.getElementById('upload-urls').value);
            form.append('paste_text', document.getElementById('upload-paste').value);

            const r = await fetch('/api/sources/upload', { method: 'POST', body: form });
            const data = await r.json();
            const count = (data.added || []).length;
            submitBtn.textContent = `Added ${count} source(s)`;
            setTimeout(() => { closeUploadModal(); location.reload(); }, 800);
        } catch (err) {
            submitBtn.textContent = 'Add';
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
            alert('Upload error: ' + err.message);
        }
    }

    // ── Sources ──
    async function deleteSource(id) {
        if (!confirm('Delete this source?')) return;
        await fetch('/api/sources/' + id, { method: 'DELETE' });
        document.getElementById('src-' + id)?.remove();
    }

    async function loadSources() {
        const btn = document.getElementById('load-btn');
        btn.textContent = 'Loading...';
        btn.classList.add('loading');
        btn.disabled = true;
        try {
            const r = await fetch('/api/sources/load/' + NB_ID, {
                method: 'POST',
            });
            const data = await r.json();
            const total = (data.loaded || 0) + (data.backfilled || 0);
            btn.textContent = `Done — ${data.loaded || 0} loaded, ${data.backfilled || 0} updated`;
            btn.classList.remove('loading');
            setTimeout(() => location.reload(), 1000);
        } catch (e) {
            btn.textContent = 'Load Sources';
            btn.classList.remove('loading');
            btn.disabled = false;
            alert('Load error: ' + e.message);
        }
    }

    // ── Chatlogs ──
    async function newChatlog() {
        const form = new FormData();
        form.append('notebook_id', NB_ID);
        const r = await fetch('/api/chatlogs', { method: 'POST', body: form });
        const data = await r.json();
        currentChatlogId = data.id;
        const list = document.getElementById('log-list');
        const div = document.createElement('div');
        div.className = 'log-item active';
        div.id = 'log-' + data.id;
        div.onclick = () => loadChatlog(data.id);
        div.innerHTML = `<span class="title">${data.title}</span>
            <div class="actions">
                <button onclick="event.stopPropagation();downloadChatlog('${data.id}')" title="Download">&#11015;</button>
                <button onclick="event.stopPropagation();deleteChatlog('${data.id}')" title="Delete">✕</button>
            </div>`;
        list.prepend(div);
        document.querySelectorAll('.log-item').forEach(el => {
            if (el.id !== 'log-' + data.id) el.classList.remove('active');
        });
        document.getElementById('chat-messages').innerHTML =
            '<div class="msg msg-system">New chat started</div>';
    }

    async function loadChatlog(id) {
        currentChatlogId = id;
        document.querySelectorAll('.log-item').forEach(el => el.classList.remove('active'));
        document.getElementById('log-' + id)?.classList.add('active');

        const r = await fetch('/api/chatlogs/' + id + '/messages');
        const msgs = await r.json();
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        msgs.forEach(m => appendMessage(m.role, m.content, null, m.search_results));
        container.scrollTop = container.scrollHeight;
    }

    function downloadChatlog(id) {
        window.open('/api/chatlogs/' + id + '/download', '_blank');
    }

    async function deleteChatlog(id) {
        if (!confirm('Delete this chat?')) return;
        await fetch('/api/chatlogs/' + id, { method: 'DELETE' });
        document.getElementById('log-' + id)?.remove();
        if (currentChatlogId === id) {
            currentChatlogId = null;
            document.getElementById('chat-messages').innerHTML =
                '<div class="msg msg-system">Select a chat to continue</div>';
        }
    }

    // ── Chat ──
    function appendMessage(role, content, searchResults) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg msg-${role}`;
        if (role === 'assistant' && content) {
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = marked.parse(content);
            div.appendChild(contentDiv);
        } else {
            const textNode = document.createTextNode(content || '');
            div.appendChild(textNode);
        }

        if (searchResults) {
            try {
                const sr = typeof searchResults === 'string' ? JSON.parse(searchResults) : searchResults;
                if (sr.length > 0) {
                    const box = document.createElement('div');
                    box.className = 'search-results';
                    box.innerHTML = '<strong>Search results:</strong><br>' +
                        sr.map(r => `<a href="${r.url}" target="_blank">${r.title}</a>`).join('<br>');
                    div.appendChild(box);
                }
            } catch {}
        }

        container.appendChild(div);
        return div;
    }

    async function sendMessage() {
        if (isStreaming) return;
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (!message) return;

        if (!currentChatlogId) {
            await newChatlog();
        }

        input.value = '';
        appendMessage('user', message);

        const assistantDiv = appendMessage('assistant', '');
        const container = document.getElementById('chat-messages');
        container.scrollTop = container.scrollHeight;
        let streamedText = '';

        isStreaming = true;
        document.getElementById('send-btn').disabled = true;

        try {
            const r = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    notebook_id: NB_ID,
                    message: message,
                    chatlog_id: currentChatlogId,
                    enable_search: document.getElementById('enable-search').checked,
                    system_prompt: document.getElementById('system-prompt').value,
                    temperature: parseFloat(document.getElementById('temperature').value),
                }),
            });

            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const data = JSON.parse(line.slice(6));
                        if (data.type === 'tool_status') {
                            if (!assistantDiv.querySelector('.tool-status')) {
                                const ts = document.createElement('div');
                                ts.className = 'tool-status';
                                assistantDiv.insertBefore(ts, assistantDiv.firstChild);
                            }
                            assistantDiv.querySelector('.tool-status').textContent += data.content;
                            container.scrollTop = container.scrollHeight;
                        } else if (data.type === 'thinking') {
                            if (!assistantDiv.querySelector('.thinking')) {
                                const details = document.createElement('details');
                                details.className = 'thinking';
                                details.innerHTML = '<summary>Thinking...</summary><pre></pre>';
                                assistantDiv.insertBefore(details, assistantDiv.firstChild);
                            }
                            assistantDiv.querySelector('.thinking pre').textContent += data.content;
                            container.scrollTop = container.scrollHeight;
                        } else if (data.type === 'chunk') {
                            streamedText += data.content;
                            assistantDiv.lastChild.textContent = streamedText;
                            container.scrollTop = container.scrollHeight;
                        } else if (data.type === 'error') {
                            streamedText += '\nError: ' + data.content;
                            assistantDiv.lastChild.textContent = streamedText;
                        }
                    } catch {}
                }
            }
        } catch (e) {
            streamedText += '\nConnection error: ' + e.message;
        }

        // Render markdown after stream completes
        if (streamedText) {
            const mdDiv = document.createElement('div');
            mdDiv.innerHTML = marked.parse(streamedText);
            assistantDiv.replaceChild(mdDiv, assistantDiv.lastChild);
        }

        isStreaming = false;
        document.getElementById('send-btn').disabled = false;
    }
    </script>
