<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ notebook.name }} — SoyLM</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-tertiary: #f1f3f4;
            --bg-input: #ffffff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --text-dim: #80868b;
            --accent: #1a73e8;
            --accent-hover: #1557b0;
            --accent-light: #e8f0fe;
            --border: #dadce0;
            --border-light: #e8eaed;
            --danger: #d93025;
            --success: #1e8e3e;
            --warning: #f9ab00;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 1px 3px rgba(60,64,67,0.12), 0 1px 2px rgba(60,64,67,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Google Sans', 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-secondary); color: var(--text-primary);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* ── Header ── */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; border-bottom: 1px solid var(--border);
            background: var(--bg-primary); flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header .back {
            color: var(--text-secondary); text-decoration: none; font-size: 18px;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background 0.1s;
        }
        .header .back:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .header h1 { font-size: 16px; font-weight: 500; }
        .header .badge {
            font-size: 11px; padding: 2px 8px; border-radius: 12px;
            background: var(--accent-light); color: var(--accent); font-weight: 500;
        }

        /* ── 3-Column Layout ── */
        .columns {
            display: grid; grid-template-columns: 260px 1fr 260px;
            flex: 1; overflow: hidden;
        }

        /* ── Left: Sources ── */
        .col-sources {
            border-right: 1px solid var(--border); background: var(--bg-primary);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .col-title {
            padding: 14px 16px; font-size: 12px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-secondary); border-bottom: 1px solid var(--border-light);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .source-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .source-item {
            padding: 8px 10px; border-radius: var(--radius);
            margin-bottom: 2px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            transition: background 0.1s;
        }
        .source-item:hover { background: var(--bg-tertiary); }
        .source-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .source-item .status {
            width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0;
        }
        .status-loaded { background: var(--success); }
        .status-pending { background: var(--warning); }
        .source-item .del-btn {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 14px; opacity: 0; transition: opacity 0.1s;
        }
        .source-item:hover .del-btn { opacity: 1; }
        .source-item .del-btn:hover { color: var(--danger); }
        .source-actions {
            padding: 10px 12px; border-top: 1px solid var(--border-light); flex-shrink: 0;
        }

        /* ── Center: Chat ── */
        .col-chat {
            display: flex; flex-direction: column; overflow: hidden;
            background: var(--bg-secondary);
        }
        .chat-toolbar {
            padding: 8px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
            background: var(--bg-primary);
        }
        .chat-toolbar label {
            font-size: 12px; color: var(--text-secondary);
        }
        .chat-toolbar .toggle {
            display: flex; align-items: center; gap: 4px; font-size: 12px;
            color: var(--text-secondary); cursor: pointer; user-select: none;
        }
        .chat-toolbar .toggle input { accent-color: var(--accent); }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 20px; display: flex;
            flex-direction: column; gap: 12px;
        }
        .msg {
            max-width: 85%; padding: 12px 16px; border-radius: var(--radius-lg);
            font-size: 14px; line-height: 1.6; word-break: break-word;
        }
        .msg h1, .msg h2, .msg h3, .msg h4 { margin: 8px 0 4px; }
        .msg h1 { font-size: 16px; }
        .msg h2 { font-size: 15px; }
        .msg h3 { font-size: 14px; }
        .msg p { margin: 4px 0; }
        .msg ul, .msg ol { margin: 4px 0; padding-left: 20px; }
        .msg li { margin: 2px 0; }
        .msg hr { margin: 8px 0; border-color: var(--border-light); }
        .msg table { font-size: 13px; border-collapse: collapse; margin: 6px 0; }
        .msg th, .msg td { padding: 4px 10px; border: 1px solid var(--border); }
        .msg code { font-size: 13px; background: var(--bg-tertiary); padding: 1px 5px; border-radius: 4px; }
        .msg pre { background: #263238; color: #eeffff; padding: 10px; border-radius: var(--radius); overflow-x: auto; }
        .msg pre code { background: none; padding: 0; color: inherit; }
        .msg blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 6px 0; color: var(--text-secondary); }
        .msg-user {
            align-self: flex-end; background: var(--accent); color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg-assistant {
            align-self: flex-start; background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }
        .msg-system {
            align-self: center; background: transparent; color: var(--text-dim);
            font-size: 13px;
        }
        .thinking {
            margin-bottom: 8px; font-size: 12px; color: var(--text-dim);
        }
        .thinking summary {
            cursor: pointer; color: var(--text-secondary);
            font-size: 12px; user-select: none;
        }
        .thinking pre {
            margin: 6px 0 0; white-space: pre-wrap; font-size: 12px;
            max-height: 200px; overflow-y: auto; color: var(--text-dim);
            background: var(--bg-secondary); padding: 8px; border-radius: var(--radius);
        }
        .source-extract-panel {
            margin: 4px 0; padding: 14px 16px;
            background: var(--bg-primary); border: 1px solid var(--border-light);
            border-radius: var(--radius-lg); box-shadow: var(--shadow);
        }
        .source-extract-panel .source-entry {
            display: flex; gap: 8px; align-items: flex-start;
            margin-bottom: 8px; font-size: 13px;
            padding: 6px 8px; border-radius: var(--radius);
            transition: background 0.1s;
        }
        .source-extract-panel .source-entry:hover { background: var(--bg-tertiary); }
        .chat-input-bar {
            padding: 12px 20px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; flex-shrink: 0;
            background: var(--bg-primary);
        }
        .chat-input-bar textarea {
            flex: 1; padding: 10px 14px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 24px;
            color: var(--text-primary); font-size: 14px; resize: none;
            outline: none; min-height: 44px; max-height: 120px;
            font-family: inherit;
        }
        .chat-input-bar textarea:focus { border-color: var(--accent); background: var(--bg-primary); }
        .chat-input-bar .send-btn {
            width: 44px; height: 44px; border-radius: 50%; border: none;
            background: var(--accent); color: #fff; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.15s;
        }
        .chat-input-bar .send-btn:hover { background: var(--accent-hover); }
        .chat-input-bar .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── Right: Chat Logs ── */
        .col-logs {
            border-left: 1px solid var(--border); background: var(--bg-primary);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .log-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .log-item {
            padding: 8px 10px; border-radius: var(--radius); margin-bottom: 2px;
            font-size: 13px; cursor: pointer; display: flex; align-items: center;
            justify-content: space-between; transition: background 0.1s;
        }
        .log-item:hover { background: var(--bg-tertiary); }
        .log-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
        .log-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-item .actions { display: flex; gap: 2px; }
        .log-item .actions button {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 13px; padding: 2px 4px; border-radius: 4px;
        }
        .log-item .actions button:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .log-actions {
            padding: 10px 12px; border-top: 1px solid var(--border-light); flex-shrink: 0;
        }

        /* ── Shared ── */
        .btn {
            padding: 8px 16px; border-radius: var(--radius); border: none;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
            width: 100%;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline {
            background: transparent; color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        .btn-load {
            background: var(--accent); color: #fff; font-weight: 500;
        }
        .btn-load:hover { background: var(--accent-hover); }
        .btn + .btn { margin-top: 6px; }
        .loading { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 24px; width: 480px; max-width: 90vw;
            box-shadow: 0 8px 24px rgba(60,64,67,0.2);
        }
        .modal h3 { margin-bottom: 16px; font-size: 16px; font-weight: 500; }
        .modal input[type="file"], .modal textarea, .modal input[type="text"] {
            width: 100%; padding: 10px 12px; margin-bottom: 12px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text-primary);
            font-size: 13px; font-family: inherit;
        }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
        .modal .btn-row .btn { width: auto; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="/" class="back">&larr;</a>
            <h1>{{ notebook.name }}</h1>
            <span class="badge" id="source-count">{{ sources|length }} sources</span>
        </div>
        <div id="vllm-status" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);">
            <span id="vllm-dot" style="width:8px;height:8px;border-radius:50%;background:var(--text-dim);"></span>
            <span id="vllm-label">vLLM: checking...</span>
        </div>
    </div>

    <!-- 3 Columns -->
    <div class="columns">
        <!-- LEFT: Sources -->
        <div class="col-sources">
            <div class="col-title">
                Sources
                <button class="btn btn-outline" style="width:auto;padding:4px 10px;" onclick="openUploadModal()">+ Add</button>
            </div>
            <div class="source-list" id="source-list">
                {% for s in sources %}
                <div class="source-item" id="src-{{ s.id }}" onclick="previewSource('{{ s.id }}')" style="cursor:pointer;">
                    <span class="status {{ 'status-loaded' if s.loaded else 'status-pending' }}"></span>
                    <span class="name" title="{{ s.filename }}">{{ s.filename }}</span>
                    <button class="del-btn" onclick="event.stopPropagation();deleteSource('{{ s.id }}')" title="Delete">&times;</button>
                </div>
                {% endfor %}
            </div>
            <div class="source-actions">
                <button class="btn btn-load" id="load-btn" onclick="loadSources()">
                    Load Sources
                </button>
            </div>
        </div>

        <!-- CENTER: Chat -->
        <div class="col-chat">
            <div class="chat-toolbar">
                <input type="hidden" id="temperature" value="0.1">
                <button class="btn btn-outline" style="width:auto;padding:4px 8px;margin-left:auto;font-size:12px;" onclick="openSettingsModal()">Settings</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg msg-system">Add sources and click "Load Sources" to get started</div>
            </div>
            <div class="chat-input-bar">
                <textarea id="chat-input" placeholder="Ask a question..." rows="1"
                    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">&#9654;</button>
            </div>
        </div>

        <!-- RIGHT: Chat Logs -->
        <div class="col-logs">
            <div class="col-title">
                History
                <button class="btn btn-outline" style="width:auto;padding:4px 10px;" onclick="newChatlog()">+ New</button>
            </div>
            <div class="log-list" id="log-list">
                {% for cl in chatlogs %}
                <div class="log-item" id="log-{{ cl.id }}" onclick="loadChatlog('{{ cl.id }}')">
                    <span class="title">{{ cl.title }}</span>
                    <div class="actions">
                        <button onclick="event.stopPropagation();downloadChatlog('{{ cl.id }}')" title="Download">&#8595;</button>
                        <button onclick="event.stopPropagation();deleteChatlog('{{ cl.id }}')" title="Delete">&times;</button>
                    </div>
                </div>
                {% endfor %}
            </div>
            <div class="log-actions">
                <button class="btn btn-outline" onclick="newChatlog()">+ New Chat</button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="upload-modal">
        <div class="modal">
            <h3>Add Sources</h3>
            <form id="upload-form" onsubmit="uploadSources(event)">
                <input type="file" id="upload-files" multiple accept=".txt,.md,.py,.rs,.ts,.js,.json,.csv,.html,.xml,.yaml,.yml,.toml,.pdf">
                <textarea id="upload-urls" placeholder="Enter URLs (one per line, YouTube supported)" rows="3"></textarea>
                <textarea id="upload-paste" placeholder="Paste text directly..."></textarea>
                <div class="btn-row">
                    <button type="button" class="btn btn-outline" onclick="closeUploadModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h3>Chat Settings</h3>
            <label style="display:block;font-size:13px;color:var(--text-secondary);margin-bottom:4px;">System Prompt</label>
            <textarea id="system-prompt" rows="6" placeholder="You are an expert research assistant..."></textarea>
            <div class="btn-row">
                <button class="btn btn-outline" onclick="closeSettingsModal()">Cancel</button>
                <button class="btn btn-primary" onclick="applySettings()">Apply</button>
            </div>
        </div>
    </div>

    <!-- Source Preview Modal -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal" style="width:640px;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                <h3 id="preview-title" style="margin:0;">Source Preview</h3>
                <button class="btn btn-outline" style="width:auto;padding:4px 12px;" onclick="closePreviewModal()">Close</button>
            </div>
            <div id="preview-meta" style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;"></div>
            <div id="preview-content" style="flex:1;overflow-y:auto;white-space:pre-wrap;font-size:13px;
                background:var(--bg-secondary);padding:12px;border-radius:var(--radius);max-height:60vh;word-break:break-word;"></div>
        </div>
    </div>

    <script>
    const NB_ID = '{{ notebook.id }}';
    let currentChatlogId = null;
    let isStreaming = false;

    // ── vLLM Status ──
    async function pollVllmStatus() {
        try {
            const r = await fetch('/api/vllm/status');
            const s = await r.json();
            const dot = document.getElementById('vllm-dot');
            const label = document.getElementById('vllm-label');
            if (s.ready) {
                dot.style.background = 'var(--success)';
                label.textContent = s.pid ? `vLLM: running (PID ${s.pid})` : 'vLLM: running';
            } else if (s.pid) {
                dot.style.background = 'var(--warning)';
                label.textContent = `vLLM: starting (PID ${s.pid})`;
            } else {
                dot.style.background = 'var(--text-dim)';
                label.textContent = 'vLLM: offline';
            }
        } catch { }
    }
    pollVllmStatus();
    setInterval(pollVllmStatus, 5000);

    // ── Modals ──
    function openUploadModal() { document.getElementById('upload-modal').classList.add('show'); }
    function closeUploadModal() { document.getElementById('upload-modal').classList.remove('show'); }
    function openSettingsModal() { document.getElementById('settings-modal').classList.add('show'); }
    function closeSettingsModal() { document.getElementById('settings-modal').classList.remove('show'); }
    function applySettings() { closeSettingsModal(); }
    function openPreviewModal() { document.getElementById('preview-modal').classList.add('show'); }
    function closePreviewModal() { document.getElementById('preview-modal').classList.remove('show'); }

    async function previewSource(id) {
        openPreviewModal();
        document.getElementById('preview-title').textContent = 'Loading...';
        document.getElementById('preview-meta').textContent = '';
        document.getElementById('preview-content').textContent = '';
        try {
            const r = await fetch('/api/sources/' + id);
            const data = await r.json();
            document.getElementById('preview-title').textContent = data.filename || 'Source';
            const meta = [`Type: ${data.source_type}`, `Tokens: ~${data.token_estimate}`, `Loaded: ${data.loaded ? 'Yes' : 'No'}`];
            if (data.summary) meta.push(`Summary: ${data.summary}`);
            document.getElementById('preview-meta').textContent = meta.join(' | ');
            const text = data.raw_text || '(no content)';
            document.getElementById('preview-content').textContent = text.slice(0, 50000);
        } catch (e) {
            document.getElementById('preview-title').textContent = 'Error';
            document.getElementById('preview-content').textContent = e.message;
        }
    }

    async function uploadSources(e) {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.textContent = 'Adding...';
        submitBtn.disabled = true;
        submitBtn.classList.add('loading');
        try {
            const form = new FormData();
            form.append('notebook_id', NB_ID);
            const files = document.getElementById('upload-files').files;
            for (const f of files) form.append('files', f);
            form.append('urls', document.getElementById('upload-urls').value);
            form.append('paste_text', document.getElementById('upload-paste').value);

            const r = await fetch('/api/sources/upload', { method: 'POST', body: form });
            const data = await r.json();
            const count = (data.added || []).length;
            submitBtn.textContent = `Added ${count} source(s)`;
            setTimeout(() => { closeUploadModal(); location.reload(); }, 800);
        } catch (err) {
            submitBtn.textContent = 'Add';
            submitBtn.disabled = false;
            submitBtn.classList.remove('loading');
            alert('Upload error: ' + err.message);
        }
    }

    // ── Sources ──
    async function deleteSource(id) {
        if (!confirm('Delete this source?')) return;
        await fetch('/api/sources/' + id, { method: 'DELETE' });
        document.getElementById('src-' + id)?.remove();
    }

    async function loadSources() {
        const btn = document.getElementById('load-btn');
        btn.textContent = 'Loading...';
        btn.classList.add('loading');
        btn.disabled = true;
        try {
            const r = await fetch('/api/sources/load/' + NB_ID, { method: 'POST' });
            const data = await r.json();
            btn.textContent = `Done — ${data.loaded || 0} loaded, ${data.backfilled || 0} updated`;
            btn.classList.remove('loading');
            setTimeout(() => location.reload(), 1000);
        } catch (e) {
            btn.textContent = 'Load Sources';
            btn.classList.remove('loading');
            btn.disabled = false;
            alert('Load error: ' + e.message);
        }
    }

    // ── Chatlogs ──
    async function newChatlog() {
        const form = new FormData();
        form.append('notebook_id', NB_ID);
        const r = await fetch('/api/chatlogs', { method: 'POST', body: form });
        const data = await r.json();
        currentChatlogId = data.id;
        const list = document.getElementById('log-list');
        const div = document.createElement('div');
        div.className = 'log-item active';
        div.id = 'log-' + data.id;
        div.onclick = () => loadChatlog(data.id);
        div.innerHTML = `<span class="title">${data.title}</span>
            <div class="actions">
                <button onclick="event.stopPropagation();downloadChatlog('${data.id}')" title="Download">&#8595;</button>
                <button onclick="event.stopPropagation();deleteChatlog('${data.id}')" title="Delete">&times;</button>
            </div>`;
        list.prepend(div);
        document.querySelectorAll('.log-item').forEach(el => {
            if (el.id !== 'log-' + data.id) el.classList.remove('active');
        });
        document.getElementById('chat-messages').innerHTML =
            '<div class="msg msg-system">New chat started</div>';
    }

    async function loadChatlog(id) {
        currentChatlogId = id;
        document.querySelectorAll('.log-item').forEach(el => el.classList.remove('active'));
        document.getElementById('log-' + id)?.classList.add('active');
        const r = await fetch('/api/chatlogs/' + id + '/messages');
        const msgs = await r.json();
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        msgs.forEach(m => appendMessage(m.role, m.content));
        container.scrollTop = container.scrollHeight;
    }

    function downloadChatlog(id) {
        window.open('/api/chatlogs/' + id + '/download', '_blank');
    }

    async function deleteChatlog(id) {
        if (!confirm('Delete this chat?')) return;
        await fetch('/api/chatlogs/' + id, { method: 'DELETE' });
        document.getElementById('log-' + id)?.remove();
        if (currentChatlogId === id) {
            currentChatlogId = null;
            document.getElementById('chat-messages').innerHTML =
                '<div class="msg msg-system">Select a chat to continue</div>';
        }
    }

    // ── Chat ──
    function appendMessage(role, content) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `msg msg-${role}`;
        if (role === 'assistant' && content) {
            const contentDiv = document.createElement('div');
            contentDiv.innerHTML = marked.parse(content);
            div.appendChild(contentDiv);
        } else {
            div.appendChild(document.createTextNode(content || ''));
        }
        container.appendChild(div);
        return div;
    }

    let pendingMessage = '';
    let pendingSourceIds = [];

    async function sendMessage() {
        if (isStreaming) return;
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (!message) return;

        if (!currentChatlogId) await newChatlog();

        input.value = '';
        appendMessage('user', message);
        pendingMessage = message;

        const container = document.getElementById('chat-messages');

        // Extract step: find matching sources
        const extractDiv = document.createElement('div');
        extractDiv.className = 'msg msg-assistant';
        extractDiv.innerHTML = '<span style="color:var(--text-dim)">Finding sources...</span>';
        container.appendChild(extractDiv);
        container.scrollTop = container.scrollHeight;

        try {
            const resp = await fetch('/api/sources/extract', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notebook_id: NB_ID, message }),
            });
            const data = await resp.json();
            const hasSources = data.sources && data.sources.length > 0;

            pendingSourceIds = (data.sources || []).map(s => s.id);

            if (hasSources) {
                let html = '<div class="source-extract-panel">';
                html += `<div style="margin-bottom:8px;color:var(--text-dim);font-size:12px">Keywords: <code style="background:var(--bg-tertiary);padding:1px 4px;border-radius:3px">${data.keywords}</code></div>`;
                html += `<div style="margin-bottom:6px;font-size:12px;font-weight:500;color:var(--text-secondary)">Sources (${data.sources.length})</div>`;
                data.sources.forEach(s => {
                    html += `<div class="source-entry">`;
                    html += `<span style="color:var(--success);font-size:10px;margin-top:3px">&#9679;</span>`;
                    html += `<span><strong style="font-size:13px">${s.filename}</strong><br><span style="color:var(--text-dim);font-size:12px">${s.summary.substring(0,120)}... (~${s.token_estimate} tok)</span></span>`;
                    html += `</div>`;
                });
                html += `<button class="btn btn-primary" onclick="executeStream()" style="margin-top:10px;padding:8px 24px">Generate</button>`;
                html += '</div>';
                extractDiv.innerHTML = html;
            } else {
                extractDiv.innerHTML = '<span style="color:var(--text-dim)">No matching sources. Generating from general knowledge...</span>';
                pendingSourceIds = [];
                await executeStream();
            }
        } catch (e) {
            extractDiv.innerHTML = `<span style="color:var(--danger)">Source extraction failed: ${e.message}</span>`;
            pendingSourceIds = [];
            await executeStream();
        }
        container.scrollTop = container.scrollHeight;
    }

    async function executeStream() {
        const container = document.getElementById('chat-messages');
        const assistantDiv = appendMessage('assistant', '');
        container.scrollTop = container.scrollHeight;

        isStreaming = true;
        document.getElementById('send-btn').disabled = true;

        try {
            const r = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    notebook_id: NB_ID,
                    message: pendingMessage,
                    chatlog_id: currentChatlogId,
                    system_prompt: document.getElementById('system-prompt').value,
                    temperature: parseFloat(document.getElementById('temperature').value),
                    source_ids: pendingSourceIds,
                }),
            });

            const reader = r.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const data = JSON.parse(line.slice(6));
                        if (data.type === 'thinking') {
                            // Stream thinking in real-time
                            if (!assistantDiv.querySelector('.thinking')) {
                                const details = document.createElement('details');
                                details.className = 'thinking';
                                details.open = true;
                                details.innerHTML = '<summary>Thinking...</summary><pre></pre>';
                                assistantDiv.insertBefore(details, assistantDiv.firstChild);
                            }
                            assistantDiv.querySelector('.thinking pre').textContent += data.content;
                            container.scrollTop = container.scrollHeight;
                        } else if (data.type === 'content') {
                            // Complete content arrives as single block — render markdown
                            const mdDiv = document.createElement('div');
                            mdDiv.innerHTML = marked.parse(data.content);
                            // Replace any existing text node
                            if (assistantDiv.lastChild && assistantDiv.lastChild.nodeType === 3) {
                                assistantDiv.replaceChild(mdDiv, assistantDiv.lastChild);
                            } else {
                                assistantDiv.appendChild(mdDiv);
                            }
                            container.scrollTop = container.scrollHeight;
                        } else if (data.type === 'error') {
                            const errDiv = document.createElement('div');
                            errDiv.style.color = 'var(--danger)';
                            errDiv.textContent = 'Error: ' + data.content;
                            assistantDiv.appendChild(errDiv);
                        }
                    } catch {}
                }
            }
        } catch (e) {
            const errDiv = document.createElement('div');
            errDiv.style.color = 'var(--danger)';
            errDiv.textContent = 'Connection error: ' + e.message;
            assistantDiv.appendChild(errDiv);
        }

        isStreaming = false;
        document.getElementById('send-btn').disabled = false;
    }
    </script>
</body>
</html>
