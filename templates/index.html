<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoyLM</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --bg-hover: #f1f3f4;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --accent: #1a73e8;
            --accent-hover: #1557b0;
            --accent-light: #e8f0fe;
            --border: #dadce0;
            --danger: #d93025;
            --success: #1e8e3e;
            --radius: 8px;
            --shadow: 0 1px 3px rgba(60,64,67,0.12), 0 1px 2px rgba(60,64,67,0.08);
            --shadow-hover: 0 4px 8px rgba(60,64,67,0.15), 0 1px 3px rgba(60,64,67,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Google Sans', 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 22px; font-weight: 600;
            color: var(--text-primary);
        }
        .header .subtitle { color: var(--text-secondary); font-size: 13px; margin-left: 10px; }
        .container { max-width: 960px; margin: 32px auto; padding: 0 20px; }
        .create-bar {
            display: flex; gap: 10px; margin-bottom: 28px;
        }
        .create-bar input {
            flex: 1; padding: 12px 16px;
            background: var(--bg-primary); border: 1px solid var(--border);
            border-radius: var(--radius); color: var(--text-primary);
            font-size: 14px; outline: none;
        }
        .create-bar input:focus { border-color: var(--accent); }
        .btn {
            padding: 10px 20px; border-radius: var(--radius); border: none;
            font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
        }
        .btn-primary {
            background: var(--accent); color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .notebooks-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .notebook-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
            cursor: pointer; transition: all 0.15s; position: relative;
            box-shadow: var(--shadow);
        }
        .notebook-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
        }
        .notebook-card h3 { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
        .notebook-card .meta { font-size: 12px; color: var(--text-secondary); }
        .notebook-card .delete-btn {
            position: absolute; top: 12px; right: 12px;
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 16px; opacity: 0; transition: opacity 0.15s;
        }
        .notebook-card:hover .delete-btn { opacity: 1; }
        .notebook-card .delete-btn:hover { color: var(--danger); }
        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--text-secondary);
        }
        .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text-primary); font-weight: 500; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex;align-items:baseline;">
            <h1>SoyLM</h1>
            <span class="subtitle">Local Research Assistant</span>
        </div>
    </div>
    <div class="container">
        <form class="create-bar" onsubmit="createNotebook(event)">
            <input type="text" id="nb-name" placeholder="Notebook name..." value="New Notebook">
            <button type="submit" class="btn btn-primary">+ Create</button>
        </form>

        {% if notebooks %}
        <div class="notebooks-grid">
            {% for nb in notebooks %}
            <div class="notebook-card" onclick="location.href='/notebook/{{ nb.id }}'">
                <button class="delete-btn" onclick="event.stopPropagation();deleteNotebook('{{ nb.id }}')" title="Delete">&times;</button>
                <h3>{{ nb.name }}</h3>
                <div class="meta">{{ nb.updated_at }}</div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <h2>No notebooks yet</h2>
            <p>Create one to get started</p>
        </div>
        {% endif %}
    </div>

    <script>
    async function createNotebook(e) {
        e.preventDefault();
        const name = document.getElementById('nb-name').value.trim();
        if (!name) return;
        const form = new FormData();
        form.append('name', name);
        const r = await fetch('/api/notebooks', { method: 'POST', body: form });
        const data = await r.json();
        location.href = '/notebook/' + data.id;
    }
    async function deleteNotebook(id) {
        if (!confirm('Delete this notebook?')) return;
        await fetch('/api/notebooks/' + id, { method: 'DELETE' });
        location.reload();
    }
    </script>
</body>
</html>
